[tox]
envlist = py,typing,lint,docs,coverage-report
isolated_build = True

[testenv]
description = Run pytest.
commands =
    pytest --cov=semaphore --cov-branch --cov-report= {posargs}
runner = uv-venv-lock-runner
setenv =
    SEMAPHORE_GITHUB_APP_PRIVATE_KEY = githubprivatekey
    SEMAPHORE_GITHUB_WEBHOOK_SECRET = webhooksecret
    SEMAPHORE_LOG_LEVEL = debug
    SEMAPHORE_PHALANX_ENV = idfdev

[testenv:coverage-report]
description = Compile coverage from each test run.
commands = coverage report
depends =
    py
package = skip

[testenv:docs]
description = Build documentation (HTML) with Sphinx.
commands =
    sphinx-build -W --keep-going -n -T -b html -d {envtmpdir}/doctrees docs docs/_build/html
dependency_groups =
    dev
    docs

[testenv:docs-linkcheck]
description = Check links in the documentation.
allowlist_externals =
    make
commands =
    make linkcheck
dependency_groups =
    dev
    docs

[testenv:lint]
description = Lint codebase by running prek.
commands = prek run --all-files
package = skip
uv_sync_flags = --only-group, lint

[testenv:run]
description = Run the development server with auto-reload for code changes.
usedevelop = true
commands = uvicorn semaphore.main:app --port 8080 --reload {posargs}

[testenv:typing]
description = Run mypy.
commands =
    mypy src/semaphore tests
package = skip
dependency_groups =
    dev
    typing
